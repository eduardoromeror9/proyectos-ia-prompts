<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsForge Chat</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="btn-new-chat" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Nuevo chat
          </button>
          <button class="btn-icon btn-close-sidebar" id="closeSidebar" type="button" aria-label="Cerrar panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section">
            <span class="nav-label">Hoy</span>
            <ul class="chat-list">
              <li>
                <button class="chat-item active" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Consulta sobre documentación</span>
                </button>
              </li>
              <li>
                <button class="chat-item" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Resumen de archivos PDF</span>
                </button>
              </li>
            </ul>
          </div>

          <div class="nav-section">
            <span class="nav-label">Ayer</span>
            <ul class="chat-list">
              <li>
                <button class="chat-item" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Configuración de embeddings</span>
                </button>
              </li>
              <li>
                <button class="chat-item" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Integración con API REST</span>
                </button>
              </li>
              <li>
                <button class="chat-item" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Optimización de búsqueda</span>
                </button>
              </li>
            </ul>
          </div>

          <div class="nav-section">
            <span class="nav-label">Últimos 7 días</span>
            <ul class="chat-list">
              <li>
                <button class="chat-item" type="button">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                  <span>Indexación de base de datos</span>
                </button>
              </li>
            </ul>
          </div>
        </nav>

        <div class="sidebar-footer">
          <button class="user-menu" type="button">
            <div class="user-avatar">E</div>
            <span class="user-name">Eduardo</span>
            <svg class="user-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
        </div>
      </aside>

      <!-- Overlay for mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Main chat -->
      <main class="main">
        <header class="main-header">
          <button class="btn-icon btn-open-sidebar" id="openSidebar" type="button" aria-label="Abrir panel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
          </button>
          <div class="model-selector">
            <span>InsForge RAG</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </div>
          <div class="header-spacer"></div>
        </header>

        <div class="chat-area">
          <!-- Welcome state -->
          <div class="welcome">
            <div class="welcome-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 8v4M12 16h.01" />
              </svg>
            </div>
            <h1>¿En qué puedo ayudarte?</h1>
            <p>Pregunta sobre tus documentos indexados o sube nuevos archivos para analizar.</p>
          </div>

          <!-- Sample messages (hidden by default, uncomment to preview) -->
          <!--
          <div class="messages">
            <article class="message user">
              <div class="message-avatar user-avatar-sm">E</div>
              <div class="message-content">
                <p>¿Cómo funciona el sistema de embeddings en InsForge?</p>
              </div>
            </article>
            <article class="message assistant">
              <div class="message-avatar assistant-avatar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v2h-2v-2zm0-10h2v8h-2V7z"/>
                </svg>
              </div>
              <div class="message-content">
                <p>InsForge utiliza embeddings vectoriales para convertir tus documentos en representaciones numéricas que permiten búsqueda semántica. Cuando subes un documento, se divide en fragmentos, cada uno se vectoriza, y se almacena en la base de datos para consultas RAG.</p>
              </div>
            </article>
          </div>
          -->
        </div>

        <footer class="input-area">
          <div class="input-container">
            <button class="btn-attach" type="button" aria-label="Adjuntar archivo">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
              </svg>
            </button>
            <textarea
              class="chat-input"
              placeholder="Envía un mensaje..."
              rows="1"
            ></textarea>
            <button class="btn-send" type="button" aria-label="Enviar mensaje" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
          <p class="input-disclaimer">InsForge RAG puede cometer errores. Verifica la información importante.</p>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
